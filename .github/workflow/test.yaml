name: Build TFLite aarch64 (Python 3.11 on Debian Bookworm Slim)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout TFlite-builds Repository
      uses: actions/checkout@v3

    - name: Ensure Docker is installed
      run: |
        sudo apt-get update
        sudo apt-get install -y docker.io

    - name: Clone TensorFlow and apply Debian-specific fixes
      run: |
        # Clone the TensorFlow repo and check out the stable version (v2.18.0)
        git clone https://github.com/tensorflow/tensorflow.git
        cd tensorflow
        git checkout v2.18.0

        # Remove the Ubuntu-specific PPA line from the Dockerfile (for debian:bookworm-slim)
        sed -i '/add-apt-repository ppa:deadsnakes\/ppa/d' lite/tools/pip_package/Dockerfile.py3

        # For Python 3.11, insert removal of EXTERNALLY-MANAGED so that whl packages from external sources are allowed.
        # This adds the line right after the curl command that downloads get-pip.py.
        sed -i '/curl -OL https:\/\/bootstrap.pypa.io\/get-pip.py/a RUN rm \/usr\/lib\/python$PYTHON_VERSION\/EXTERNALLY-MANAGED' lite/tools/pip_package/Dockerfile.py3
      shell: bash

    - name: Build aarch64 TFLite Wheel
      run: |
        cd tensorflow/lite/tools/pip_package
        # Build with 4 parallel jobs. Override BASE_IMAGE to use debian:bookworm-slim and set Python version.
        BUILD_NUM_JOBS=4 make docker-build TENSORFLOW_TARGET=aarch64 PYTHON_VERSION=3.11 BASE_IMAGE=debian:bookworm-slim
      shell: bash

    - name: Upload TFLite Wheel Artifact
      uses: actions/upload-artifact@v3
      with:
        name: tflite-aarch64-wheel
        path: tensorflow/lite/tools/pip_package/wheelhouse/*.whl
