name: Build-TFLite-Runtime
on: [push]

jobs:
  build-tflite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64, amd64]  # Build for both ARM64 and x86_64
    env:
      TENSORFLOW_VERSION: "2.13.0"
    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential openjdk-11-jdk python3-dev swig git

      - name: Setup Bazel
        uses: bazelbuild/setup-bazel@v1
        with:
          bazel-version: "6.1.1"

      - name: Fetch TensorFlow Source
        run: git clone --depth 1 -b v${TENSORFLOW_VERSION} https://github.com/tensorflow/tensorflow.git

      - name: Generate selective ops header (BirdNET model)
        run: |
          # Download or provide the BirdNET TFLite model file before this step.
          python tensorflow/tensorflow/lite/tools/optimize/print_selective_registration_header.py \
            --input_tflite_files=BirdNET_model.tflite > tensorflow/tensorflow/lite/ops_to_register.h

      - name: Build TFLite Runtime
        working-directory: tensorflow
        env:
          # Set architecture-specific Bazel config if needed (for cross-compiling)
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          # If cross-compiling on x86 host for ARM64, load proper config
          if [ "$TARGET_ARCH" == "arm64" ]; then 
            ARCH_CONFIG="--config=elinux_aarch64"
          else 
            ARCH_CONFIG=""
          fi
          # Build the TFLite C++ library with selective ops and XNNPACK
          bazel build -c opt --define=tflite_with_xnnpack=true --config=monolithic $ARCH_CONFIG \
            --copt=-O3 --copt=-DNDEBUG --copt=-fdata-sections --linkopt=-Wl,--gc-sections \
            //tensorflow/lite:libtensorflowlite.so
          # Build the Python wheel package for tflite_runtime
          bazel build -c opt $ARCH_CONFIG //tensorflow/lite/python:tflite_runtime
          # Copy out the wheel file
          cp bazel-bin/tensorflow/lite/python/tflite_runtime-*.whl ../tflite_runtime_${TARGET_ARCH}.whl

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: tflite_runtime_${{ matrix.arch }}
          path: tflite_runtime_${{ matrix.arch }}.whl
