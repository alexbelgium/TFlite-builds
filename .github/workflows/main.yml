name: publish-tflite-runtime-wheels

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: write  # Ensure GITHUB_TOKEN can create releases

env:
  TFLITE_VERSION: "2.17.1"

jobs:
  build-tflite-runtime:
    runs-on: ubuntu-latest
    name: Build TFLite Runtime wheels
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64,aarch64]
        python: ["3.11"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Debug Matrix
        run: |
          echo "Matrix Arch: ${{ matrix.arch }}"
          echo "Matrix Python: ${{ matrix.python }}"

      - name: Cleanup old wheels and cache
        run: |
          rm -rf wheels/* || true
          if [ -d "tensorflow" ]; then
            cd tensorflow
            bazel clean --expunge
          fi
          rm -rf ~/.cache/bazel

      - name: Free up Disk Space
        run: |
          df -h
          docker system prune -af

      - name: Set up QEMU for ARM Emulation
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Run Build in Container
        run: |
          set -eux
          ARCH="${{ matrix.arch }}"
          PYTHON_VERSION=${{ matrix.python }}

          echo "Building for architecture: $ARCH"

          # Use a Bookworm-based image for all Python versions to ensure a recent Clang.
          DOCKER_IMG="python:${PYTHON_VERSION}-slim-bookworm"

          # Set global flags
          GLOBAL_FLAGS="--copt=-O3 --copt=-flto --linkopt=-flto --strip=always"
          #GLOBAL_FLAGS="--config=monolithic --copt=-DNDEBUG --copt=-fdata-sections --linkopt=-Wl,--gc-sections --copt=-O3 --copt=-flto --linkopt=-flto --strip=always"
          
          # Set architecture-specific build flags.
          case "$ARCH" in
            x86_64) ARCH_FLAG="--cpu=k8";;
            aarch64) ARCH_FLAG="--cpu=aarch64 --config=elinux_aarch64";;
            *)
              echo "Warning: Unknown architecture '$ARCH'"
              exit 1
              ;;
          esac

          # Set the Docker platform flag.
          case "$ARCH" in
            x86_64) PLATFORM_FLAG="--platform=linux/amd64";;
            aarch64) PLATFORM_FLAG="--platform=linux/arm64";;
            *)
              echo "Warning: Unknown architecture '$ARCH'"
              exit 1
              ;;
          esac

          docker run --rm --privileged $PLATFORM_FLAG \
            -v $PWD:/work \
            -w /work \
            -e ARCH="$ARCH" \
            -e PYTHON_VERSION="$PYTHON_VERSION" \
            -e ARCH_FLAG="$ARCH_FLAG" \
            -e GLOBAL_FLAGS="$GLOBAL_FLAGS" \
            $DOCKER_IMG \
            bash -c "
              set -eux

              # ========== 1) Install System Dependencies ==========
              apt-get update
              apt-get install -y build-essential clang git zip unzip pkg-config curl

              # ========== 2) Install Stable Bazel Version ==========
              case "$ARCH" in
                x86_64) curl -sSL https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-amd64 -o /usr/local/bin/bazel;;
                aarch64) curl -sSL https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-arm64 -o /usr/local/bin/bazel;;
                *)
                  echo "Warning: Unknown architecture '$ARCH'"
                  exit 1
                  ;;
              esac
              chmod +x /usr/local/bin/bazel

              # ========== 3) Set up Bazel Cache Permissions ==========
              mkdir -p /root/.cache/bazel
              #chown -R $(whoami) /root/.cache/bazel
              chmod -R u+rw /root/.cache/bazel

              # ========== 4) Create and Activate Virtual Environment ==========
              python -m venv /opt/tflite_env
              source /opt/tflite_env/bin/activate

              # Upgrade pip and install required Python packages.
              pip install --upgrade pip wheel numpy auditwheel setuptools

              # ========== 5) Clone TensorFlow v2.17.1 ==========
              git clone https://github.com/tensorflow/tensorflow.git
              cd tensorflow
              git checkout tags/v${TFLITE_VERSION}

              # ========== 6) Build TFLite Runtime ==========
              export CC=clang
              export TF_PYTHON_VERSION=${PYTHON_VERSION}
              export PYTHON=/opt/tflite_env/bin/python

              ./tensorflow/lite/tools/pip_package/build_pip_package_with_bazel.sh \
                --define=tflite_enable_xnnpack=true \
                --define=xnnpack_enable_subgraph_reshaping=true \
                --define=no_tensorflow_py_deps=true \
                $ARCH_FLAG \
                $GLOBAL_FLAGS \
                --verbose_failures \
                --jobs=1

              # ========== 7) Locate and Rename the Built Wheel ==========
              mkdir -p /work/wheels
              WHEEL_PATH=\$(find tensorflow/lite/tools/pip_package/gen/tflite_pip/python3/dist -name \"*.whl\" | head -n 1)

              if [[ -z \"\$WHEEL_PATH\" ]]; then
                echo \"Error: No wheel file found!\"
                exit 1
              fi

              echo \"Found wheel: \$WHEEL_PATH\"

              # Generate new filename: tflite_runtime-{TFLITE_VERSION}-{PYTHON_VERSION}-linux_{ARCH}.whl
              NEW_WHEEL_PATH=\"/work/wheels/tflite_runtime-${TFLITE_VERSION}-${PYTHON_VERSION}-linux_${ARCH}.whl\"
              mv \"\$WHEEL_PATH\" \"\$NEW_WHEEL_PATH\"

              echo \"Renamed wheel to: \$NEW_WHEEL_PATH\"
            "

      - name: Clean up Docker
        run: docker system prune -af

      - name: List Built Wheels
        run: ls -l wheels

      - name: Verify Wheel Architectures
        run: file wheels/*.whl

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tflite_runtime-${{ env.TFLITE_VERSION }}-${{ matrix.arch }}-py${{ matrix.python }}
          path: wheels/*.whl

  release:
    runs-on: ubuntu-latest
    needs: build-tflite-runtime
    name: Create and Upload Release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels

      - name: List Downloaded Wheels
        run: find wheels

      - name: Authenticate GitHub CLI
        run: gh auth status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (if not exists)
        run: |
          gh release view ${{ env.TFLITE_VERSION }} -R "${{ github.repository }}" > /dev/null 2>&1 || \
          gh release create ${{ env.TFLITE_VERSION }} \
            -R "${{ github.repository }}" \
            --title "tflite_runtime ${{ env.TFLITE_VERSION }}" \
            --notes "Automated build for tflite_runtime ${{ env.TFLITE_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Wheels to GitHub Release
        run: |
          gh release upload ${{ env.TFLITE_VERSION }} wheels/**/*.whl --clobber -R "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
