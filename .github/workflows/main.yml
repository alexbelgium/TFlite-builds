name: publish-tflite-runtime-wheels

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: write  # Ensure GITHUB_TOKEN can create releases

env:
  TFLITE_VERSION: "2.17.1"

jobs:
  build-tflite-runtime:
    runs-on: ubuntu-latest
    name: Build TFLite Runtime wheels
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64, x86_64_noavx]
        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU for ARM Emulation
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Run Build in Container
        run: |
          ARCH=${{ matrix.arch }}
          PYTHON_VERSION=${{ matrix.python }}

          DOCKER_IMG="python:${PYTHON_VERSION}-slim-bookworm"

          # Global Bazel flags (added --linkopt=-fuse-ld=lld, you can drop clang if you prefer gcc)
          GLOBAL_FLAGS="--config=monolithic \
                        --copt=-DNDEBUG --copt=-fdata-sections --linkopt=-Wl,--gc-sections \
                        --copt=-O3 --copt=-flto --linkopt=-flto --strip=always \
                        --linkopt=-fuse-ld=lld --jobs=2"

          if [[ "$ARCH" == "aarch64" ]]; then
            ARCH_FLAG="--cpu=aarch64 --config=elinux_aarch64"
            PLATFORM_FLAG="--platform=linux/arm64"
          elif [[ "$ARCH" == "x86_64" ]]; then
            ARCH_FLAG="--cpu=k8"
            PLATFORM_FLAG="--platform=linux/amd64"
          elif [[ "$ARCH" == "x86_64_noavx" ]]; then
            ARCH_FLAG="--cpu=core2 --copt=-mno-avx --copt=-mno-avx2 --copt=-msse4.2 --copt=-msse4.1"
            PLATFORM_FLAG="--platform=linux/amd64"
          else
            echo "Unknown architecture: $ARCH"
            exit 1
          fi

          docker run --rm --privileged $PLATFORM_FLAG \
            -v $PWD:/work \
            -w /work \
            $DOCKER_IMG \
            bash -c "
              set -eux
              apt-get update
              apt-get install -y \
                build-essential \
                clang \
                git \
                zip \
                unzip \
                pkg-config \
                curl \
                zlib1g-dev \
                lld

              # Optionally skip clang for ARM: apt-get remove clang
              # or just do not export CC=clang below.

              # Install Bazelisk
              if [[ \"$ARCH\" == \"aarch64\" ]]; then
                curl -sSL https://github.com/bazelbuild/bazelisk/releases/download/v1.17.0/bazelisk-linux-arm64 -o /usr/local/bin/bazel
              else
                curl -sSL https://github.com/bazelbuild/bazelisk/releases/download/v1.17.0/bazelisk-linux-amd64 -o /usr/local/bin/bazel
              fi
              chmod +x /usr/local/bin/bazel

              python -m venv /opt/tflite_env
              source /opt/tflite_env/bin/activate
              pip install --upgrade pip wheel numpy auditwheel setuptools

              git clone https://github.com/tensorflow/tensorflow.git
              cd tensorflow
              git checkout tags/v${TFLITE_VERSION}

              # If you really want clang:
              export CC=clang
              export CXX=clang++

              export TF_PYTHON_VERSION=${PYTHON_VERSION}
              export PYTHON=/opt/tflite_env/bin/python

              ./tensorflow/lite/tools/pip_package/build_pip_package_with_bazel.sh \
                --define=tflite_enable_xnnpack=true \
                --define=xnnpack_enable_subgraph_reshaping=true \
                --define=no_tensorflow_py_deps=true \
                ${ARCH_FLAG} \
                ${GLOBAL_FLAGS}

              mkdir -p /work/wheels
              WHEEL_PATH=\$(find tensorflow/lite/tools/pip_package/gen/tflite_pip/python3/dist -name \"*.whl\" | head -n 1)
              if [[ -z \"\$WHEEL_PATH\" ]]; then
                echo \"Error: No wheel file found!\"
                exit 1
              fi
              if [[ \"$ARCH\" == \"aarch64\" ]]; then
                ARCH_NAME=\"aarch64\"
              elif [[ \"$ARCH\" == \"x86_64\" ]]; then
                ARCH_NAME=\"x86_64\"
              else
                ARCH_NAME=\"x86_64_noavx\"
              fi
              NEW_WHEEL_PATH=\"/work/wheels/tflite_runtime-${TFLITE_VERSION}-${PYTHON_VERSION}-linux_\${ARCH_NAME}.whl\"
              mv \"\$WHEEL_PATH\" \"\$NEW_WHEEL_PATH\"
            "

      - name: List Built Wheels
        run: ls -l wheels

      - name: Verify Wheel Architectures
        run: file wheels/*.whl

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tflite_runtime-${{ env.TFLITE_VERSION }}-${{ matrix.arch }}-py${{ matrix.python }}
          path: wheels/*.whl

  release:
    runs-on: ubuntu-latest
    needs: build-tflite-runtime
    name: Create and Upload Release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels

      - name: List Downloaded Wheels
        run: find wheels

      - name: Authenticate GitHub CLI
        run: gh auth status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (if not exists)
        run: |
          gh release view ${{ env.TFLITE_VERSION }} -R "${{ github.repository }}" > /dev/null 2>&1 || \
          gh release create ${{ env.TFLITE_VERSION }} \
            -R "${{ github.repository }}" \
            --title "tflite_runtime ${{ env.TFLITE_VERSION }}" \
            --notes "Automated build for tflite_runtime ${{ env.TFLITE_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Wheels to GitHub Release
        run: |
          gh release upload ${{ env.TFLITE_VERSION }} wheels/**/*.whl --clobber -R "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
