name: publish-litert-runtime-wheels

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: write  # Ensure GITHUB_TOKEN can create releases

env:
  LITERT_VERSION: "2.17.1"
  TOOLCHAIN_DIR: "${{ github.workspace }}/toolchains"

jobs:
  build-litert-runtime-x86_64:
    runs-on: ubuntu-latest
    name: Build LiteRT for x86_64
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake git zip unzip pkg-config curl python${{ matrix.python }}-dev python${{ matrix.python }}-venv

      - name: Set Up Python Environment
        run: |
          python${{ matrix.python }} -m venv /opt/litert_env
          source /opt/litert_env/bin/activate
          pip install --upgrade pip wheel numpy setuptools

      - name: Clone LiteRT (TensorFlow Lite)
        run: |
          git clone https://github.com/tensorflow/tensorflow.git
          cd tensorflow
          git checkout tags/v${LITERT_VERSION}

      - name: Build LiteRT with CMake
        run: |
          mkdir -p tensorflow/lite/build
          cd tensorflow/lite/build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=x86_64

          make -j$(nproc)

      - name: Build Python Wheel
        run: |
          source /opt/litert_env/bin/activate
          PYTHON=python${{ matrix.python }} tensorflow/lite/tools/pip_package/build_pip_package_with_cmake.sh x86_64

      - name: Upload x86_64 Wheel
        uses: actions/upload-artifact@v4
        with:
          name: litert_runtime-x86_64-py${{ matrix.python }}
          path: tensorflow/lite/build/*.whl

  build-litert-runtime-aarch64:
    runs-on: ubuntu-latest
    name: Cross-Compile LiteRT for aarch64
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential cmake git zip unzip pkg-config curl python${{ matrix.python }}-dev python${{ matrix.python }}-venv

      - name: Set Up Cross-Compilation Toolchain
        run: |
          mkdir -p ${TOOLCHAIN_DIR}
          curl -LO https://storage.googleapis.com/mirror.tensorflow.org/developer.arm.com/media/Files/downloads/gnu-a/8.3-2019.03/binrel/gcc-arm-8.3-2019.03-x86_64-aarch64-linux-gnu.tar.xz
          tar -xf gcc-arm-8.3-2019.03-x86_64-aarch64-linux-gnu.tar.xz -C ${TOOLCHAIN_DIR}
          echo "TOOLCHAIN_PREFIX=${TOOLCHAIN_DIR}/gcc-arm-8.3-2019.03-x86_64-aarch64-linux-gnu/bin/aarch64-linux-gnu-" >> $GITHUB_ENV

      - name: Set Up Python Environment
        run: |
          python${{ matrix.python }} -m venv /opt/litert_env
          source /opt/litert_env/bin/activate
          pip install --upgrade pip wheel numpy setuptools

      - name: Clone LiteRT (TensorFlow Lite)
        run: |
          git clone https://github.com/tensorflow/tensorflow.git
          cd tensorflow
          git checkout tags/v${LITERT_VERSION}

      - name: Build LiteRT with CMake for aarch64
        run: |
          mkdir -p tensorflow/lite/build
          cd tensorflow/lite/build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=${{ env.TOOLCHAIN_PREFIX }}gcc \
            -DCMAKE_CXX_COMPILER=${{ env.TOOLCHAIN_PREFIX }}g++

          make -j$(nproc)

      - name: Build Python Wheel
        run: |
          source /opt/litert_env/bin/activate
          PYTHON=python${{ matrix.python }} tensorflow/lite/tools/pip_package/build_pip_package_with_cmake.sh aarch64

      - name: Upload aarch64 Wheel
        uses: actions/upload-artifact@v4
        with:
          name: litert_runtime-aarch64-py${{ matrix.python }}
          path: tensorflow/lite/build/*.whl

  release:
    runs-on: ubuntu-latest
    needs: [build-litert-runtime-x86_64, build-litert-runtime-aarch64]
    name: Create and Upload Release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels

      - name: List Downloaded Wheels
        run: find wheels

      - name: Authenticate GitHub CLI
        run: gh auth status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (if not exists)
        run: |
          gh release view ${{ env.LITERT_VERSION }} -R "${{ github.repository }}" > /dev/null 2>&1 || \
          gh release create ${{ env.LITERT_VERSION }} \
            -R "${{ github.repository }}" \
            --title "LiteRT ${{ env.LITERT_VERSION }}" \
            --notes "Automated build for LiteRT ${{ env.LITERT_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Wheels to GitHub Release
        run: |
          gh release upload ${{ env.LITERT_VERSION }} wheels/**/*.whl --clobber -R "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
