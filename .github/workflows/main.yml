name: publish-tflite-runtime-wheels

on:
  workflow_dispatch:

permissions:
  contents: write  # Ensure GITHUB_TOKEN can create releases

env:
  TFLITE_VERSION: "2.17.1"
#  USE_BAZEL_VERSION: "8.*"

jobs:
  build-tflite-runtime:
    runs-on: ubuntu-latest
    name: Build TFLite Runtime wheels
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64]
        python: ["3.11"]
#        arch: [x86_64, x86_64_noavx, aarch64]
#        python: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Debug Matrix
        run: |
          echo "Matrix Arch: ${{ matrix.arch }}"
          echo "Matrix Python: ${{ matrix.python }}"

      - name: Free up Disk Space
        run: |
          df -h
          docker system prune -af

      - name: Set up QEMU for ARM Emulation
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Prepare Namings
        id: prepare_names
        run: |
          echo "python_version_name=${{ matrix.python }}" | sed 's/\.//g' >> $GITHUB_ENV
          case "${{ matrix.arch }}" in
            x86_64|aarch64)
              echo "tflite_version_name=${TFLITE_VERSION}" >> $GITHUB_ENV
              echo "arch_version=${{ matrix.arch }}" >> $GITHUB_ENV
            ;;
            x86_64_noavx)
              echo "tflite_version_name=${TFLITE_VERSION}_noavx" >> $GITHUB_ENV
              echo "arch_version=x86_64" >> $GITHUB_ENV
            ;;
            *)
              echo "Warning: Unknown architecture $ARCH"
              exit 1
            ;;
          esac


      - name: Run Build in Container
        run: |
          set -eux
          ARCH="${{ matrix.arch }}"
          PYTHON_VERSION="${{ matrix.python }}"

          echo "Building for architecture: $ARCH"

          # Use an Ubuntu-based image for all Python versions to ensure a recent Clang.
          DOCKER_IMG="python:${PYTHON_VERSION}-bookworm"

          # Set global flags
          GLOBAL_FLAGS="--strip=always"
          
          # Set architecture-specific build flags.
          case "$ARCH" in
            x86_64) ARCH_FLAG="--cpu=k8";;
            x86_64_noavx) ARCH_FLAG="--cpu=core2 --copt=-mno-avx --copt=-mno-avx2 --copt=-msse4.2 --copt=-msse4.1";;
            aarch64) ARCH_FLAG="--config=elinux_aarch64";;
            *)
              echo "Warning: Unknown architecture '$ARCH'"
              exit 1
              ;;
          esac

          # Set the Docker platform flag.
          case "$ARCH" in
            x86_64*) PLATFORM_FLAG="--platform=linux/amd64";;
            aarch64) PLATFORM_FLAG="--platform=linux/arm64";;
            *)
              echo "Warning: Unknown architecture '$ARCH'"
              exit 1
              ;;
          esac

          docker run --rm --privileged $PLATFORM_FLAG \
            -v $PWD:/work \
            -w /work \
            -e ARCH="$ARCH" \
            -e PYTHON_VERSION="$PYTHON_VERSION" \
            -e PYTHON_VERSION_NAME="${{ env.python_version_name }}" \
            -e TFLITE_VERSION="$TFLITE_VERSION" \
            -e TFLITE_VERSION_NAME="${{ env.tflite_version_name }}" \
            -e ARCH_VERSION="${{ env.arch_version }}" \
            -e ARCH_FLAG="$ARCH_FLAG" \
            -e GLOBAL_FLAGS="$GLOBAL_FLAGS" \
            --memory=8g --cpus=4 \
            $DOCKER_IMG \
            bash -c "
              set -eux

              echo \"STARTING BUILD : env \$(uname) -m arch $ARCH python $PYTHON_VERSION with flags $ARCH_FLAG $GLOBAL_FLAGS\"

              # ========== 1) Install System Dependencies ==========
              apt-get update
              export DEBIAN_FRONTEND=noninteractive
              apt-get install --no-install-recommends -y build-essential clang git zip unzip pkg-config curl # python3-pygments python3-pkg-resources

              # ========== 2) Install Stable Bazel Version ==========
              curl -sSL https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-amd64 -o /usr/local/bin/bazel

              # Add permissions
              chmod 777 /usr/local/bin/bazel
              echo \"Bazel version is \$(bazel --version)\"

              # ========== 3) Set up Bazel Cache Permissions ==========
              mkdir -p /root/.cache/bazel
              chmod -R u+rw /root/.cache/bazel

              # ========== 4) Create and Activate Virtual Environment ==========
              python -m venv /opt/tflite_env
              source /opt/tflite_env/bin/activate

              # Upgrade pip and install required Python packages.
              pip install --upgrade pip wheel numpy auditwheel setuptools

              # ========== 5) Clone TensorFlow v2.17.1 ==========
              git clone https://github.com/tensorflow/tensorflow.git
              cd tensorflow
              git checkout tags/v\${TFLITE_VERSION}

              # ========== 6) Build TFLite Runtime ==========
              export CC=clang
              export TF_PYTHON_VERSION=\${PYTHON_VERSION}
              export PYTHON=/opt/tflite_env/bin/python
              export BAZELISK_CACHE=/tmp/bazelisk_cache
              mkdir -p /tmp/bazelisk_cache

              [[ \"\${ARCH_VERSION}\" == \"aarch64\" ]] \&\& export TENSORFLOW_TARGET=\"aarch64\"

              ./tensorflow/lite/tools/pip_package/build_pip_package_with_bazel.sh --define=tflite_enable_xnnpack=true \
                --define=xnnpack_enable_subgraph_reshaping=true \
                --define=no_tensorflow_py_deps=true \
                \$ARCH_FLAG \
                \$GLOBAL_FLAGS \
                --verbose_failures

              # ========== 7) Locate and Rename the Built Wheel ==========
              mkdir -p /work/wheels
              WHEEL_PATH=\$(find tensorflow/lite/tools/pip_package/gen/tflite_pip/python3/dist -name \"*.whl\" | head -n 1)

              if [[ -z \"\$WHEEL_PATH\" ]]; then
                echo \"Error: No wheel file found!\"
                exit 1
              fi

              echo \"Found wheel: \$WHEEL_PATH\"

              NEW_WHEEL_PATH="/work/wheels/tflite_runtime-\${TFLITE_VERSION_NAME}-cp\${PYTHON_VERSION_NAME}-cp\${PYTHON_VERSION_NAME}-linux_\${ARCH_VERSION_NAME}.whl"
              mv \"\$WHEEL_PATH\" \"\$NEW_WHEEL_PATH\"

              echo \"Renamed wheel to: \$NEW_WHEEL_PATH\"
            "

      - name: Clean up Docker
        run: docker system prune -af

      - name: List Built Wheels
        run: ls -l wheels

      - name: Verify Wheel Architectures
        run: file wheels/*.whl

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tflite_runtime-${{ env.tflite_version_name }}-cp${{ env.python_version_name }}-cp${{ env.python_version_name }}-linux_${{ env.arch_version_name }}
          path: wheels/*.whl

  release:
    runs-on: ubuntu-latest
    needs: build-tflite-runtime
    name: Create and Upload Release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels

      - name: List Downloaded Wheels
        run: find wheels

      - name: Authenticate GitHub CLI
        run: gh auth status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (if not exists)
        run: |
          gh release view ${{ env.TFLITE_VERSION }} -R "${{ github.repository }}" > /dev/null 2>&1 || \
          gh release create ${{ env.TFLITE_VERSION }} \
            -R "${{ github.repository }}" \
            --title "tflite_runtime ${{ env.TFLITE_VERSION }}" \
            --notes "Automated build for tflite_runtime ${{ env.TFLITE_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Wheels to GitHub Release
        run: |
          gh release upload ${{ env.TFLITE_VERSION }} wheels/**/*.whl --clobber -R "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
