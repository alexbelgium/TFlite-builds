name: publish-tflite-runtime-wheels

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  TFLITE_VERSION: "2.17.1"
  PYTHON_VERSION: "3.11"  # Easily change Python version here

jobs:
  build-tflite-runtime:
    runs-on: ubuntu-latest  # Using Debian Bookworm in Docker
    name: Build TFLite Runtime wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            docker_img: debian:bookworm
            arch_flag: "--cpu=k8"
          - arch: aarch64
            docker_img: debian:bookworm
            arch_flag: "--cpu=aarch64"

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Run Build in Debian Bookworm Container
        run: |
          docker run --rm --privileged \
            -v $PWD:/work \
            -w /work \
            ${{ matrix.docker_img }} \
            bash -c "
              set -eux

              # ========== 1) Install Dependencies ==========
              apt-get update
              apt-get install -y build-essential python${PYTHON_VERSION} python${PYTHON_VERSION}-dev python3-pip \
                                 clang git zip unzip pkg-config curl

              # Install Bazelisk (to fetch Bazel automatically)
              curl -sSL https://github.com/bazelbuild/bazelisk/releases/download/v1.17.0/bazelisk-linux-amd64 -o /usr/local/bin/bazel
              chmod +x /usr/local/bin/bazel

              # Upgrade pip and install required Python packages
              python${PYTHON_VERSION} -m pip install --upgrade pip wheel numpy auditwheel

              # ========== 2) Clone TensorFlow v2.17.1 ==========
              git clone https://github.com/tensorflow/tensorflow.git
              cd tensorflow
              git checkout tags/v${TFLITE_VERSION}

              # ========== 3) Build TFLite Runtime ==========
              export CC=clang
              export TF_PYTHON_VERSION=${PYTHON_VERSION}
              export PYTHON=python${PYTHON_VERSION}

              ./tensorflow/lite/tools/pip_package/build_pip_package_with_bazel.sh native \
                --define=tflite_enable_xnnpack=true \
                --define=xnnpack_enable_subgraph_reshaping=true \
                --define=no_tensorflow_py_deps=true \
                --define=tflite_enable_select_tf_ops=true \
                ${{ matrix.arch_flag }}

              # ========== 4) Move the Built Wheel ==========
              mkdir -p /work/wheels
              WHEEL_PATH=\$(find tensorflow/lite/tools/pip_package/gen/tflite_pip/python3/dist -name \"*.whl\" | head -n 1)

              if [[ -z \"\$WHEEL_PATH\" ]]; then
                echo \"Error: No wheel file found!\"
                exit 1
              fi

              # ========== 5) Audit and Repair the Wheel ==========
              auditwheel repair \"\$WHEEL_PATH\" -w /work/wheels
            "

      - name: List Built Wheels
        run: ls -l wheels

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tflite_runtime-${{ env.TFLITE_VERSION }}-${{ matrix.arch }}
          path: wheels/*.whl

      - name: Create GitHub Release (if not exists)
        run: |
          gh release view ${{ env.TFLITE_VERSION }} > /dev/null 2>&1 || \
          gh release create ${{ env.TFLITE_VERSION }} --title "tflite_runtime ${{ env.TFLITE_VERSION }}" --notes "Automated build for tflite_runtime ${{ env.TFLITE_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Wheels to GitHub Release
        run: |
          for file in wheels/*.whl; do
            gh release upload ${{ env.TFLITE_VERSION }} "$file" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
