name: publish-tflite-runtime-wheels

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  TFLITE_VERSION: "2.17.1"

jobs:
  build-tflite-runtime:
    runs-on: ubuntu-latest
    name: Build TFLite Runtime wheels
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            docker_img: quay.io/pypa/manylinux2014_x86_64
            manylinux_tag: manylinux2014_x86_64
          - arch: aarch64
            docker_img: quay.io/pypa/manylinux2014_aarch64
            manylinux_tag: manylinux2014_aarch64

    steps:
      # 1) Checkout source (for GH release scripts, etc.)
      - name: Check out repository
        uses: actions/checkout@v3

      # 2) Enable QEMU so we can run aarch64 container on x86_64 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: all

      # 3) Pull the manylinux2014 image and build
      - name: Build TFLite wheel in Docker
        id: build_in_docker
        run: |
          # Pull the correct manylinux2014 base
          docker pull ${{ matrix.docker_img }}

          # Run inside Docker
          # We mount the current workspace into /work
          docker run --rm --privileged \
            -v $PWD:/work \
            -w /work \
            ${{ matrix.docker_img }} \
            bash -c "
              set -eux

              # ============== 1) Install Deps ==============
              # These commands run inside the container
              yum update -y
              yum install -y clang git zip unzip pkgconfig wget make which

              # Install Bazelisk
              curl -sSL https://github.com/bazelbuild/bazelisk/releases/download/v1.17.0/bazelisk-linux-amd64 -o /usr/local/bin/bazel
              chmod +x /usr/local/bin/bazel

              # Install Python 3.11 + pip + wheel + auditwheel + numpy
              yum install -y python311 python311-devel
              python3.11 -m pip install --upgrade pip wheel auditwheel numpy

              # Link python3.11 to /usr/bin/python3 (some scripts assume 'python3')
              ln -s /usr/bin/python3.11 /usr/bin/python3 || true

              # ============== 2) Clone TensorFlow 2.17.1 ==============
              git clone https://github.com/tensorflow/tensorflow.git
              cd tensorflow
              git checkout tags/v${TFLITE_VERSION}

              # ============== 3) Build TFLite Runtime ==============
              export CC=clang
              export TF_PYTHON_VERSION=3.11
              export PYTHON=python3

              ./tensorflow/lite/tools/pip_package/build_pip_package_with_bazel.sh native \
                --define=tflite_enable_xnnpack=true \
                --define=xnnpack_enable_subgraph_reshaping=true \
                --define=no_tensorflow_py_deps=true \
                --define=tflite_enable_select_tf_ops=true

              # The build script outputs:
              #   tensorflow/lite/tools/pip_package/gen/tflite_pip/python3/dist/*.whl
              cd tensorflow/lite/tools/pip_package/gen/tflite_pip/python3/dist

              # ============== 4) Repair the wheel with auditwheel ==============
              # This ensures we get a manylinux2014 wheel with older glibc requirements
              mkdir -p /work/wheels
              for whl in *.whl; do
                auditwheel repair \"\$whl\" -w /work/wheels
              done
            "

      # 4) Collect the built wheels
      - name: List built wheels
        run: ls -l wheels

      - name: Rename & Upload wheel artifact
        id: rename_and_upload
        run: |
          # We expect the repaired wheel in /work/wheels with a name like:
          #   tflite_runtime-2.17.1-cp311-cp311-manylinux2014_x86_64.whl
          # or a generic name from auditwheel, which we can rename to the desired pattern.
          WHEEL=$(ls wheels/*.whl | head -n 1)

          echo "Found wheel: $WHEEL"

          # We rename to the user’s desired convention:
          #   tflite_runtime-2.17.1-cp311-cp311-manylinux2014_x86_64.whl
          # but let's ensure we keep the arch consistent
          NEW_NAME="tflite_runtime-${{ env.TFLITE_VERSION }}-cp311-cp311-${{ matrix.manylinux_tag }}.whl"
          mv "$WHEEL" "wheels/$NEW_NAME"

          echo "Renamed to: wheels/$NEW_NAME"
        # We'll upload as an artifact next
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: tflite_runtime-${{ env.TFLITE_VERSION }}-${{ matrix.arch }}
          path: wheels/*.whl

      - name: Create GitHub Release (if not exists)
        run: |
          gh release view ${{ env.TFLITE_VERSION }} > /dev/null 2>&1 || \
          gh release create ${{ env.TFLITE_VERSION }} --title "tflite_runtime ${{ env.TFLITE_VERSION }}" --notes "Automated build for tflite_runtime ${{ env.TFLITE_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload wheels to GitHub Release
        run: |
          for file in wheels/*.whl; do
            gh release upload ${{ env.TFLITE_VERSION }} "$file" --clobber
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
