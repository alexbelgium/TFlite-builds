name: publish-tflite-runtime-wheels

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: write

env:
  TFLITE_VERSION: "2.17.1"

jobs:
  build-tflite-runtime:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64, x86_64_noavx]
        python_version: ["3.9", "3.10", "3.11", "3.12"]
        include:
          - arch: x86_64
            docker_img: debian:bookworm
            arch_flag: "--cpu=k8 --copt=-flto --linkopt=-flto"
          - arch: aarch64
            docker_img: debian:bookworm
            arch_flag: "--cpu=aarch64 --copt=-flto --linkopt=-flto"
          - arch: x86_64_noavx
            docker_img: debian:bookworm
            arch_flag: "--cpu=core2 --copt=-mno-avx --copt=-mno-avx2 --copt=-msse4.2 --copt=-msse4.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run Build in Debian Bookworm Container
        run: |
          docker run --rm --privileged \
            -v $PWD:/work \
            -w /work \
            ${{ matrix.docker_img }} \
            bash -c "
              set -eux

              # ========= Install Dependencies =========
              apt-get update
              apt-get install -y build-essential wget libssl-dev libffi-dev zlib1g-dev libbz2-dev \
                                 libreadline-dev libsqlite3-dev clang git zip unzip pkg-config curl

              # ========= Download and Build Python if not available =========
              PYTHON_DIR=\"/opt/python${{ matrix.python_version }}\"
              if [ ! -x \"\$PYTHON_DIR/bin/python\" ]; then
                wget https://www.python.org/ftp/python/${{ matrix.python_version }}/Python-${{ matrix.python_version }}.tgz
                tar -xf Python-${{ matrix.python_version }}.tgz
                cd Python-${{ matrix.python_version }}
                ./configure --prefix=\$PYTHON_DIR --enable-optimizations
                make -j\$(nproc)
                make install
                cd ..
              fi
              export PYTHON=\$PYTHON_DIR/bin/python

              # ========= Create and Activate Virtual Environment =========
              \$PYTHON -m venv /opt/tflite_env
              source /opt/tflite_env/bin/activate
              pip install --upgrade pip wheel numpy auditwheel

              # ========= Clone TensorFlow v2.17.1 =========
              git clone https://github.com/tensorflow/tensorflow.git
              cd tensorflow
              git checkout tags/v${TFLITE_VERSION}

              # ========= Build TFLite Runtime =========
              export CC=clang
              export TF_PYTHON_VERSION=${{ matrix.python_version }}
              export PYTHON=/opt/tflite_env/bin/python

              ./tensorflow/lite/tools/pip_package/build_pip_package_with_bazel.sh native \
                --define=tflite_enable_xnnpack=true \
                --define=xnnpack_enable_subgraph_reshaping=true \
                --define=no_tensorflow_py_deps=true \
                ${{ matrix.arch_flag }}

              # ========= Rename the Built Wheel =========
              mkdir -p /work/wheels
              WHEEL_PATH=\$(find tensorflow/lite/tools/pip_package/gen/tflite_pip/python3/dist -name \"*.whl\" | head -n 1)
              if [[ -z \"\$WHEEL_PATH\" ]]; then
                echo \"Error: No wheel file found!\"
                exit 1
              fi
              echo \"Found wheel: \$WHEEL_PATH\"

              # Ensure unique filename
              NEW_WHEEL_PATH=\"/work/wheels/\$(basename \"\$WHEEL_PATH\" .whl)-${{ matrix.arch }}-py${{ matrix.python_version }}.whl\"
              mv \"\$WHEEL_PATH\" \"\$NEW_WHEEL_PATH\"

              echo \"Renamed wheel to: \$NEW_WHEEL_PATH\"
            "

      - name: List Built Wheels
        run: ls -l wheels

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tflite_runtime-${{ env.TFLITE_VERSION }}-${{ matrix.arch }}-py${{ matrix.python_version }}
          path: wheels/*.whl

  release:
    runs-on: ubuntu-latest
    needs: build-tflite-runtime
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels

      - name: List Downloaded Wheels
        run: find wheels

      - name: Authenticate GitHub CLI
        run: gh auth status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (if not exists)
        run: |
          gh release view ${{ env.TFLITE_VERSION }} -R "${{ github.repository }}" > /dev/null 2>&1 || \
          gh release create ${{ env.TFLITE_VERSION }} \
            -R "${{ github.repository }}" \
            --title "tflite_runtime ${{ env.TFLITE_VERSION }}" \
            --notes "Automated build for tflite_runtime ${{ env.TFLITE_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Wheels to GitHub Release
        run: |
          gh release upload ${{ env.TFLITE_VERSION }} wheels/**/*.whl --clobber -R "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
