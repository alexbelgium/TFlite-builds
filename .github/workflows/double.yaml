name: double

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  contents: write  # Ensure GITHUB_TOKEN can create releases

env:
  TFLITE_VERSION: "2.17.1"
  PYTHON_VERSION: "3.11"
  DOCKER_IMG_BOOKWORM: "debian:bookworm"
  DOCKER_IMG_PYTHON: "python:3.11-slim-bookworm"
  BAZELISK_VERSION: "1.25.0"
  GLOBAL_FLAGS: "--copt=-O3 --copt=-flto --linkopt=-flto --strip=always"

jobs:
  build-tflite-runtime:
    runs-on: ubuntu-latest
    name: Build TFLite Runtime wheels
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Free up Disk Space
        run: |
          df -h
          docker system prune -af

      - name: Set up QEMU for ARM Emulation (if needed)
        if: matrix.arch == 'aarch64'
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - name: Run Build in Container
        run: |
          set -eux
          ARCH="${{ matrix.arch }}"

          # Set architecture-specific flags
          case "$ARCH" in
            x86_64) ARCH_FLAG="--cpu=k8"; PLATFORM_FLAG="--platform=linux/amd64"; DOCKER_IMG="$DOCKER_IMG_BOOKWORM";;
            aarch64) ARCH_FLAG="--cpu=aarch64 --config=elinux_aarch64"; PLATFORM_FLAG="--platform=linux/arm64"; DOCKER_IMG="$DOCKER_IMG_PYTHON";;
            *) echo "Unknown architecture $ARCH"; exit 1;;
          esac

          docker run --rm --privileged $PLATFORM_FLAG \
            -v $PWD:/work \
            -w /work \
            -e ARCH="$ARCH" \
            -e PYTHON_VERSION="$PYTHON_VERSION" \
            -e ARCH_FLAG="$ARCH_FLAG" \
            -e GLOBAL_FLAGS="$GLOBAL_FLAGS" \
            $DOCKER_IMG \
            bash -c "
              set -eux

              # Install dependencies
              apt-get update
              apt-get install -y build-essential clang git zip unzip pkg-config curl python3-pygments python3-pkg-resources

              # Install Bazelisk
              case \"$ARCH\" in
                x86_64) curl -sSL https://github.com/bazelbuild/bazelisk/releases/download/v$BAZELISK_VERSION/bazelisk-linux-amd64 -o /usr/local/bin/bazel;;
                aarch64) curl -sSL https://github.com/bazelbuild/bazelisk/releases/download/v$BAZELISK_VERSION/bazelisk-linux-arm64 -o /usr/local/bin/bazel;;
                *) echo \"Unknown architecture $ARCH\"; exit 1;;
              esac
              chmod +x /usr/local/bin/bazel

              # Create virtual environment
              python -m venv /opt/tflite_env
              source /opt/tflite_env/bin/activate
              pip install --upgrade pip wheel numpy auditwheel setuptools

              # Clone TensorFlow
              git clone https://github.com/tensorflow/tensorflow.git
              cd tensorflow
              git checkout tags/v$TFLITE_VERSION

              # Build TFLite Runtime
              export CC=clang
              export TF_PYTHON_VERSION=$PYTHON_VERSION
              export PYTHON=/opt/tflite_env/bin/python

              ./tensorflow/lite/tools/pip_package/build_pip_package_with_bazel.sh \
                --define=tflite_enable_xnnpack=true \
                --define=xnnpack_enable_subgraph_reshaping=true \
                --define=no_tensorflow_py_deps=true \
                $ARCH_FLAG \
                $GLOBAL_FLAGS

              # Locate and rename the built wheel
              mkdir -p /work/wheels
              WHEEL_PATH=\$(find tensorflow/lite/tools/pip_package/gen/tflite_pip/python3/dist -name \"*.whl\" | head -n 1)
              if [[ -z \"$WHEEL_PATH\" ]]; then echo \"Error: No wheel file found!\"; exit 1; fi
              mv \"$WHEEL_PATH\" /work/wheels/tflite_runtime-$TFLITE_VERSION-$PYTHON_VERSION-linux_$ARCH.whl
            "

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tflite_runtime-${{ env.TFLITE_VERSION }}-${{ matrix.arch }}-py${{ env.PYTHON_VERSION }}
          path: wheels/*.whl

  release:
    runs-on: ubuntu-latest
    needs: build-tflite-runtime
    name: Create and Upload Release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels

      - name: List Downloaded Wheels
        run: find wheels

      - name: Authenticate GitHub CLI
        run: gh auth status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (if not exists)
        run: |
          gh release view $TFLITE_VERSION -R \"${{ github.repository }}\" > /dev/null 2>&1 || \
          gh release create $TFLITE_VERSION \
            -R \"${{ github.repository }}\" \
            --title \"tflite_runtime $TFLITE_VERSION\" \
            --notes \"Automated build for tflite_runtime $TFLITE_VERSION\"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Wheels to GitHub Release
        run: gh release upload $TFLITE_VERSION wheels/**/*.whl --clobber -R \"${{ github.repository }}\"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}"}
