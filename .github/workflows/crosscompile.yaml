name: publish-tflite-runtime-wheels

on:
  workflow_dispatch:

permissions:
  contents: write  # Ensure GITHUB_TOKEN can create releases

env:
  TFLITE_VERSION: "2.17.1"

jobs:
  build-tflite-runtime:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64]
        python: ["3.11"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build TFLite Runtime
        run: |
          set -eux

          ARCH="${{ matrix.arch }}"
          PYTHON_VERSION="${{ matrix.python }}"
          echo "Building TFLite Runtime for $ARCH / Python $PYTHON_VERSION"

          # ========== 1) Install System Dependencies ==========
          sudo add-apt-repository ppa:deadsnakes/ppa          
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            python$PYTHON_VERSION build-essential clang git zip unzip pkg-config curl \
            python3-dev python3-venv

          # If cross-compiling for aarch64, install cross toolchain:
          if [[ "$ARCH" == "aarch64" ]]; then
            sudo apt-get install --no-install-recommends -y crossbuild-essential-arm64
          fi

          # ========== 2) Install Bazel ==========
          sudo curl -sSL https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-amd64 -o /usr/local/bin/bazel
          sudo chmod 777 /usr/local/bin/bazel
          echo "Bazel version is $(bazel --version)"

          # ========== 3) Create and Activate Python Virtual Env ==========
          python3 -m venv /tmp/tflite_env
          source /tmp/tflite_env/bin/activate
          pip install --upgrade pip wheel numpy auditwheel setuptools

          # ========== 4) Clone TensorFlow ==========
          git clone https://github.com/tensorflow/tensorflow.git
          cd tensorflow
          git checkout tags/v${TFLITE_VERSION}

          # ========== 5) Architecture-specific Flags ==========
          GLOBAL_FLAGS="--strip=always"
          EXTRA_BAZEL_FLAGS=""

          case "$ARCH" in
            x86_64)
              # Native x86_64 build
              ARCH_FLAGS="--cpu=k8"
              export CC=clang
              export CXX=clang++
              ;;
            x86_64_noavx)
              # Native x86_64 build but no AVX
              ARCH_FLAGS="--cpu=core2 --copt=-mno-avx --copt=-mno-avx2 --copt=-msse4.2 --copt=-msse4.1"
              export CC=clang
              export CXX=clang++
              ;;
            aarch64)
              # Cross-compile for aarch64
              ARCH_FLAGS="--config=elinux_aarch64 --copt=-O3 --copt=-mno-sse4.2 --copt=-mno-sse4.1 --copt=-mno-avx"
              export CC=aarch64-linux-gnu-gcc
              export CXX=aarch64-linux-gnu-g++
              export LD_LIBRARY_PATH=/usr/aarch64-linux-gnu/lib
              EXTRA_BAZEL_FLAGS="--action_env=CC=aarch64-linux-gnu-gcc --action_env=CXX=aarch64-linux-gnu-g++"
              ;;
            *)
              echo "Unknown ARCH '$ARCH'"
              exit 1
              ;;
          esac

          echo "ARCH_FLAGS: $ARCH_FLAGS"
          echo "EXTRA_BAZEL_FLAGS: $EXTRA_BAZEL_FLAGS"

          # ========== 6) Build the TFLite Runtime ==========
          export TF_PYTHON_VERSION="$PYTHON_VERSION"
          export PYTHON=$(which python)
          ./tensorflow/lite/tools/pip_package/build_pip_package_with_bazel.sh \
            --define=tflite_enable_xnnpack=true \
            --define=xnnpack_enable_subgraph_reshaping=true \
            --define=no_tensorflow_py_deps=true \
            --config=elinux_aarch64 --copt=-mavx --copt=-mavx2 --copt=-mfma --copt=-mfpmath=both --copt=-msse4.1 --copt=-msse4.2" \
            $GLOBAL_FLAGS \
            $EXTRA_BAZEL_FLAGS || echo "THIS FAILED MISERABLY"

          export PYTHON=$(which python)
          ./tensorflow/lite/tools/pip_package/build_pip_package_with_bazel.sh \
            --define=tflite_enable_xnnpack=true \
            --define=xnnpack_enable_subgraph_reshaping=true \
            --define=no_tensorflow_py_deps=true \
            --config=elinux_aarch64 -mavx -mavx2 -mfma -mfpmath=both -msse4.1 -msse4.2" \
            $GLOBAL_FLAGS \
            $EXTRA_BAZEL_FLAGS

          # ========== 7) Locate and Rename the Wheel ==========
          mkdir -p /home/runner/work/wheels
          WHEEL_PATH=$(find tensorflow/lite/tools/pip_package/gen/tflite_pip/python3/dist -name "*.whl" | head -n 1)
          if [[ -z "$WHEEL_PATH" ]]; then
            echo "Error: No wheel file found!"
            exit 1
          fi
          NEW_WHEEL_PATH="/home/runner/work/wheels/tflite_runtime-${TFLITE_VERSION}-${PYTHON_VERSION}-linux_${ARCH}.whl"
          mv "$WHEEL_PATH" "$NEW_WHEEL_PATH"
          echo "Wheel created: $NEW_WHEEL_PATH"

      - name: List Built Wheels
        run: ls -l /home/runner/work/wheels

      - name: Verify Wheel Architecture
        run: file /home/runner/work/wheels/*.whl

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tflite_runtime-${{ env.TFLITE_VERSION }}-${{ matrix.arch }}-py${{ matrix.python }}
          path: /home/runner/work/wheels/*.whl

  release:
    runs-on: ubuntu-latest
    needs: build-tflite-runtime
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels

      - name: List Downloaded Wheels
        run: find wheels

      - name: Authenticate GitHub CLI
        run: gh auth status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (if not exists)
        run: |
          gh release view ${{ env.TFLITE_VERSION }} -R "${{ github.repository }}" > /dev/null 2>&1 || \
          gh release create ${{ env.TFLITE_VERSION }} \
            -R "${{ github.repository }}" \
            --title "tflite_runtime ${{ env.TFLITE_VERSION }}" \
            --notes "Automated build for tflite_runtime ${{ env.TFLITE_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Wheels to GitHub Release
        run: |
          gh release upload ${{ env.TFLITE_VERSION }} wheels/**/*.whl --clobber -R "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
