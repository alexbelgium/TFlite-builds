name: publish-tflite-runtime-wheels

on:
  workflow_dispatch:

permissions:
  contents: write  # Ensure GITHUB_TOKEN can create releases

env:
  TFLITE_VERSION: "2.17.1"

jobs:
  build-tflite-runtime:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64]
        python: ["3.11"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          set -eux

          # 1) Install system dependencies
          sudo add-apt-repository ppa:deadsnakes/ppa
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            python${{ matrix.python }} build-essential clang git zip unzip pkg-config curl \
            python${{ matrix.python }}-dev python${{ matrix.python }}-venv

          # 2) Optionally install cross-compiler if target is aarch64
          if [[ "${{ matrix.arch }}" == "aarch64" ]]; then
            sudo apt-get install --no-install-recommends -y crossbuild-essential-arm64
          fi

          # 3) Install Bazel via bazelisk
          sudo curl -sSL https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-amd64 -o /usr/local/bin/bazel
          sudo chmod 777 /usr/local/bin/bazel
          echo "Bazel version: $(bazel --version)"

      - name: Create Python venv
        run: |
          python${{ matrix.python }} -m venv /tmp/tflite_env
          source /tmp/tflite_env/bin/activate
          pip install --upgrade pip wheel numpy auditwheel setuptools

      - name: Clone TensorFlow
        run: |
          git clone https://github.com/tensorflow/tensorflow.git
          cd tensorflow
          git checkout tags/v${{ env.TFLITE_VERSION }}

      - name: Bazel Fetch External Repos
        # We run `bazel fetch` so that external/ruy, etc., is materialized on disk
        # This allows us to do a "sed -i" or grep pass on it if necessary.
        run: |
          set -eux
          cd tensorflow
          # We only "fetch" the TFLite pip package & its deps.
          bazel fetch //tensorflow/lite/tools/pip_package:build_pip_package
          echo "Bazel fetch complete."

      - name: Remove SSE/AVX Flags
        run: |
          set -eux
          cd tensorflow

          echo "===== Searching for SSE/AVX flags BEFORE removal ====="
          # Look for -mavx, -mavx2, -msse4.1, -msse4.2
          grep -r -E --include=\*.bzl --include=\*.BUILD --include=\*.cc --include=\*.h --include=.bazelrc '(-mavx|-mavx2|-msse4\.1|-msse4\.2)' . || true

          echo "===== Removing SSE/AVX references in local TF files ====="
          # 1) TFLite local build_def.bzl
          if [[ -f tensorflow/lite/build_def.bzl ]]; then
            sed -i '/mavx/d' tensorflow/lite/build_def.bzl || true
            sed -i '/msse4\./d' tensorflow/lite/build_def.bzl || true
          fi

          # 2) .bazelrc
          if [[ -f .bazelrc ]]; then
            sed -i '/mavx/d' .bazelrc || true
            sed -i '/msse4\./d' .bazelrc || true
          fi

          echo "===== Removing SSE/AVX references in EXTERNAL repos ====="
          # Because ruy is in ./bazel-*/external/ruy,
          # we do a broader find + sed:
          find . -path '*/external/*' \
            \( -name '*.bzl' -o -name '*.BUILD' -o -name '*.bazelrc' -o -name '*.cc' -o -name '*.h' \) \
            -exec sed -i '/-mavx/d' {} \; -exec sed -i '/-mavx2/d' {} \; -exec sed -i '/-msse4\.1/d' {} \; -exec sed -i '/-msse4\.2/d' {} \; || true

          echo "===== Searching for SSE/AVX flags AFTER removal ====="
          grep -r -E --include=\*.bzl --include=\*.BUILD --include=\*.cc --include=\*.h --include=.bazelrc '(-mavx|-mavx2|-msse4\.1|-msse4\.2)' . || true

      - name: Prepare Namings
        id: prepare_names
        run: |
          echo "python_version=${{ matrix.python }}" | sed 's/\.//g' >> $GITHUB_ENV
          case "${{ matrix.arch }}" in
            x86_64|aarch64)
              echo "tflite_version=${TFLITE_VERSION}" >> $GITHUB_ENV
              echo "arch_version=${{ matrix.arch }}" >> $GITHUB_ENV
            ;;
            x86_64_noavx)
              echo "tflite_version=${TFLITE_VERSION}_noavx" >> $GITHUB_ENV
              echo "arch_version=x86_64" >> $GITHUB_ENV
            ;;
            *)
              echo "Warning: Unknown architecture $ARCH"
              exit 1
            ;;
          esac

      - name: Build TFLite Runtime
        run: |
          set -eux
          cd tensorflow
          source /tmp/tflite_env/bin/activate

          ARCH="${{ matrix.arch }}"
          PYTHON_VERSION="${{ matrix.python }}"
          echo "Building TFLite Runtime for $ARCH / Python $PYTHON_VERSION"

          # Setup cross-compiler for aarch64:
          if [[ "$ARCH" == "aarch64" ]]; then
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
            export LD_LIBRARY_PATH=/usr/aarch64-linux-gnu/lib
          fi

          # Build TFLite Python wrapper with minimal SSE/AVX references
          bazel build -c opt \
            --config=elinux_aarch64 --cpu=aarch64 \
            --strip=always \
            --verbose_failures \
            --announce_rc \
            //tensorflow/lite/python/interpreter_wrapper:_pywrap_tensorflow_interpreter_wrapper

      - name: Package Wheel
        run: |
          set -eux
          cd tensorflow
          source /tmp/tflite_env/bin/activate

          # Actually build the final pip package:
          ./tensorflow/lite/tools/pip_package/build_pip_package_with_bazel.sh \
            --define=tflite_enable_xnnpack=true \
            --define=xnnpack_enable_subgraph_reshaping=true \
            --define=no_tensorflow_py_deps=true \
            --config=elinux_aarch64 \
            --cpu=aarch64 \
            --strip=always \
            --verbose_failures \
            --announce_rc

          mkdir -p /home/runner/work/wheels
          WHEEL_PATH=$(find tensorflow/lite/tools/pip_package/gen/tflite_pip/python3/dist -name "*.whl" | head -n 1)
          if [[ -z "$WHEEL_PATH" ]]; then
            echo "Error: No wheel file found!"
            exit 1
          fi

          NEW_WHEEL_PATH="/home/runner/work/wheels/tflite_runtime-${{ env.TFLITE_VERSION }}-${{ matrix.python }}-linux_${ARCH}.whl"
          mv "$WHEEL_PATH" "$NEW_WHEEL_PATH"
          echo "Wheel created: $NEW_WHEEL_PATH"

      - name: List Built Wheels
        run: ls -l /home/runner/work/wheels

      - name: Verify Wheel Architectures
        run: file wheels/*.whl

      - name: Upload Wheel Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tflite_runtime-${{ env.tflite_version }}-cp${{ env.python_version }}-cp${{ env.python_version }}-linux_${{ env.arch_version }}
          path: wheels/*.whl

  release:
    runs-on: ubuntu-latest
    needs: build-tflite-runtime
    name: Create and Upload Release
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: wheels

      - name: List Downloaded Wheels
        run: find wheels

      - name: Authenticate GitHub CLI
        run: gh auth status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (if not exists)
        run: |
          gh release view ${{ env.TFLITE_VERSION }} -R "${{ github.repository }}" > /dev/null 2>&1 || \
          gh release create ${{ env.TFLITE_VERSION }} \
            -R "${{ github.repository }}" \
            --title "tflite_runtime ${{ env.TFLITE_VERSION }}" \
            --notes "Automated build for tflite_runtime ${{ env.TFLITE_VERSION }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Wheels to GitHub Release
        run: |
          gh release upload ${{ env.TFLITE_VERSION }} wheels/**/*.whl --clobber -R "${{ github.repository }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
